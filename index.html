<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<meta name="referrer" content="no-referrer" />
<title>Purchase Success</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: radial-gradient(ellipse at 50% -10%, #1a1620 0%, #0a0a0f 55%, #050508 100%);
    color: #f5f5f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  .card {
    width: 100%;
    max-width: 520px;
    padding: 48px 36px 40px;
    background: linear-gradient(180deg, rgba(28,22,36,0.92), rgba(14,12,20,0.92));
    border: 1px solid rgba(255, 215, 0, 0.18);
    border-radius: 22px;
    box-shadow:
      0 20px 60px rgba(0,0,0,.55),
      0 0 0 1px rgba(255,215,0,.08) inset,
      0 60px 120px -40px rgba(255,196,0,.18);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(600px 200px at 50% -50px, rgba(255,196,0,.18), transparent 60%),
      radial-gradient(400px 200px at 50% 110%, rgba(34,211,238,.10), transparent 70%);
    pointer-events: none;
  }
  .check {
    width: 88px; height: 88px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffe066, #ffb300);
    display: grid; place-items: center;
    box-shadow:
      0 0 0 6px rgba(255, 196, 0, 0.12),
      0 0 0 14px rgba(255, 196, 0, 0.05),
      0 14px 36px rgba(255, 196, 0, .35);
    animation: pop .55s cubic-bezier(.2,.85,.3,1.15) both;
  }
  .check svg { width: 46px; height: 46px; }
  .check path {
    stroke: #1a1a0a; stroke-width: 6;
    stroke-linecap: round; stroke-linejoin: round;
    fill: none;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: draw .5s .35s ease-out forwards;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 30px;
    letter-spacing: .3px;
    font-weight: 800;
    background: linear-gradient(180deg, #fff, #ffe9a8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .lede {
    margin: 0 auto 22px;
    max-width: 38ch;
    color: #d8d8e0;
    font-size: 16px;
    line-height: 1.55;
  }
  .form-wrap {
    margin: 18px 0 6px;
    text-align: left;
  }
  label.field-label {
    display: block;
    font-size: 13px;
    color: #c8c8d2;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: .3px;
  }
  input[type=text], input[type=email] {
    width: 100%;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,215,0,0.14);
    background: rgba(255,255,255,.03);
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    transition: border-color .15s, background .15s;
  }
  input[type=text]:focus, input[type=email]:focus {
    outline: none;
    border-color: rgba(255,215,0,.42);
    background: rgba(255,255,255,.06);
  }
  .row { margin-bottom: 12px; }
  .row.opt { margin-bottom: 16px; }
  .opt-toggle {
    display: inline-block;
    background: none;
    border: none;
    color: #ffd270;
    font-size: 12.5px;
    cursor: pointer;
    padding: 4px 0;
    margin-bottom: 8px;
    text-decoration: underline;
    text-decoration-color: rgba(255,210,112,.4);
  }
  .opt-toggle:hover { text-decoration-color: rgba(255,210,112,.85); }
  .activate-btn {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ffd967, #ffb300);
    color: #1a1a0a;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .4px;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s, opacity .12s;
    box-shadow: 0 6px 20px rgba(255,196,0,.35);
  }
  .activate-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(255,196,0,.5);
  }
  .activate-btn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }
  .msg {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.45;
    display: none;
  }
  .msg.error {
    background: rgba(255,80,80,.08);
    border: 1px solid rgba(255,80,80,.3);
    color: #ffb0b0;
  }
  .msg.success {
    background: rgba(80,255,160,.08);
    border: 1px solid rgba(80,255,160,.3);
    color: #b6f5cf;
  }
  .panel {
    margin: 22px 0 8px;
    padding: 16px 18px;
    border-radius: 14px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    text-align: left;
    color: #cfcfd6;
    font-size: 14.5px;
    line-height: 1.55;
  }
  .panel strong { color: #ffe9a8; }
  .small {
    margin-top: 18px;
    color: #9999a3;
    font-size: 12.5px;
    letter-spacing: .2px;
  }
  @keyframes pop {
    0% { transform: scale(.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @media (max-width: 480px) {
    .card { padding: 36px 22px 30px; border-radius: 18px; }
    h1 { font-size: 24px; }
    .lede { font-size: 15px; }
    .check { width: 76px; height: 76px; }
    .check svg { width: 38px; height: 38px; }
  }
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 60 60" aria-hidden="true">
        <path d="M14 31 L26 43 L46 19" />
      </svg>
    </div>
    <h1>Purchase Success</h1>
    <p class="lede">Your payment went through. Enter your account username below to activate access.</p>

    <form class="form-wrap" id="activate-form" autocomplete="off">
      <div class="row">
        <label class="field-label" for="username">Account Username</label>
        <input type="text" id="username" name="username" required minlength="3" maxlength="64" autocomplete="off" placeholder="your_username" />
      </div>
      <div class="row opt" id="email-row" hidden>
        <label class="field-label" for="email">Patreon Email <span style="color:#9999a3;font-weight:400;font-size:12px;">(optional)</span></label>
        <input type="email" id="email" name="email" autocomplete="off" placeholder="example@gmail.com" />
      </div>
      <button type="button" class="opt-toggle" id="opt-toggle">Trouble activating? Add Patreon email</button>
      <button type="submit" class="activate-btn" id="activate-btn">Activate Access</button>
      <div class="msg error" id="msg-error" role="alert"></div>
      <div class="msg success" id="msg-success" role="status"></div>
    </form>

    <div class="panel">
      <strong>Need help?</strong><br/>
      If anything looks off, reply to your receipt email and we&rsquo;ll sort
      it out the same day.
    </div>

    <p class="small">Thanks for the support.</p>
  </main>

  <script>
  (function() {
    var API_BASE = 'https://pornyard.xyz';
    var form    = document.getElementById('activate-form');
    var userEl  = document.getElementById('username');
    var emailEl = document.getElementById('email');
    var emailRow = document.getElementById('email-row');
    var optBtn = document.getElementById('opt-toggle');
    var btn     = document.getElementById('activate-btn');
    var errEl   = document.getElementById('msg-error');
    var okEl    = document.getElementById('msg-success');

    optBtn.addEventListener('click', function() {
      emailRow.hidden = !emailRow.hidden;
      if (!emailRow.hidden) emailEl.focus();
      optBtn.textContent = emailRow.hidden ? 'Trouble activating? Add Patreon email' : 'Hide Patreon email';
    });

    function showError(msg) {
      okEl.style.display = 'none';
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
    function showSuccess(msg) {
      errEl.style.display = 'none';
      okEl.textContent = msg;
      okEl.style.display = 'block';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errEl.style.display = 'none';
      okEl.style.display = 'none';
      var username = (userEl.value || '').trim();
      var email = (emailEl.value || '').trim().toLowerCase();
      if (!username || username.length < 3) {
        showError('Enter your account username.');
        return;
      }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Enter a valid email or leave it blank.');
        return;
      }

      btn.disabled = true;
      var origLabel = btn.textContent;
      btn.textContent = 'Activating…';

      try {
        var body = { username: username };
        if (email) body.email = email;
        var resp = await fetch(API_BASE + '/api/patreon/redeem-by-username', {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        var data = await resp.json().catch(function() { return {}; });
        if (resp.ok && data && data.success) {
          showSuccess(data.message || 'Access activated. You can close this tab and refresh the site.');
          btn.textContent = 'Activated';
          return;
        }
        var serverMsg = (data && data.error) || 'Activation failed. Try again or contact support.';
        showError(serverMsg);
        // If the server says it can't find an unclaimed patron record AND the
        // user hasn't supplied their Patreon email yet, surface the email
        // field so they can disambiguate. Don't fire when the username itself
        // wasn't found.
        var serverMsgLower = (serverMsg || '').toLowerCase();
        if (resp.status === 404 && !email && (serverMsgLower.indexOf('unclaimed') !== -1 || serverMsgLower.indexOf('no active membership') !== -1)) {
          if (emailRow.hidden) {
            emailRow.hidden = false;
            optBtn.textContent = 'Hide Patreon email';
            emailEl.focus();
          }
        }
      } catch (err) {
        showError('Network error. Check your connection and try again.');
      } finally {
        btn.disabled = false;
        if (btn.textContent === 'Activating…') btn.textContent = origLabel;
      }
    });
  })();
  </script>
</body>
</html>
